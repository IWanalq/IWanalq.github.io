{{- $username := .Get "user" | default "IWanalq" -}}
{{- $proxy := .Get "proxy" | default "https://likeyou.it.eu.org" -}}
<div id="gh-contributions-{{ $username }}" class="gh-contributions">
  <div class="gh-contributions-loading" style="text-align:center;padding:1rem;color:var(--secondary);">
    正在加载贡献热力图…
  </div>
</div>

<style>
.gh-contributions {
  overflow-x: auto;
  padding: 1rem 0;
  margin: 1.5rem 0;
}
.gh-contributions svg.js-calendar-graph-svg,
.gh-contributions table.ContributionCalendar-grid {
  display: block;
  margin: 0 auto;
  max-width: 100%;
}
.gh-contributions .ContributionCalendar-day {
  width: 11px;
  height: 11px;
  border-radius: 2px;
  outline: 1px solid rgba(255,255,255,0.05);
  outline-offset: -1px;
}
.gh-contributions .ContributionCalendar-day[data-level="0"] { fill: #161b22; background: #161b22; }
.gh-contributions .ContributionCalendar-day[data-level="1"] { fill: #0e4429; background: #0e4429; }
.gh-contributions .ContributionCalendar-day[data-level="2"] { fill: #006d32; background: #006d32; }
.gh-contributions .ContributionCalendar-day[data-level="3"] { fill: #26a641; background: #26a641; }
.gh-contributions .ContributionCalendar-day[data-level="4"] { fill: #39d353; background: #39d353; }
.gh-contributions .ContributionCalendar-label {
  font-size: 9px;
  fill: var(--secondary);
  color: var(--secondary);
}
.gh-contributions .text-small {
  font-size: 10px;
  color: var(--secondary);
}
.gh-contributions .sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}
</style>

<script>
(function() {
  var username = {{ $username | jsonify }};
  var proxy    = {{ $proxy | jsonify }};
  var url      = proxy + '/https://github.com/users/' + username + '/contributions';
  var container = document.getElementById('gh-contributions-' + username);

  fetch(url)
    .then(function(r) { return r.text(); })
    .then(function(html) {
      // 提取贡献图表格
      var match = html.match(/<table[^>]*class="ContributionCalendar-grid"[\s\S]*?<\/table>/);
      if (!match) {
        container.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--secondary);">贡献图加载失败</div>';
        return;
      }
      var tableHtml = match[0]
        .replace(/class="ContributionCalendar-day"/g, 'class="ContributionCalendar-day"')
        .replace(/data-level="(\d+)"/g, 'data-level="$1"');

      var totalMatch = html.match(/id="js-contribution-activity-description"[^>]*>[\s\S]*?([\d,]+)\s*contributions[\s\S]*?<\/h2>/);
      var totalText = totalMatch ? totalMatch[0].replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim() : '';

      container.innerHTML =
        '<div style="margin-bottom:8px;font-size:14px;color:var(--primary);">' +
        (totalText ? totalText + ' — <a href="https://github.com/' + username + '" target="_blank" rel="noopener" style="color:var(--link);">@' + username + '</a>' : '<a href="https://github.com/' + username + '" target="_blank" rel="noopener" style="color:var(--link);">@' + username + '</a>') +
        '</div>' +
        '<div style="max-width:100%;overflow-x:auto;">' + tableHtml + '</div>';
    })
    .catch(function(e) {
      console.error('GitHub contributions load failed:', e);
      container.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--secondary);">贡献图加载失败，请检查网络代理</div>';
    });
})();
</script>
