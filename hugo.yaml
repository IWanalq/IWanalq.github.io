baseURL: "https://IWanalq.github.io/"
languageCode: "zh-cn"
title: "回顾笔记"
theme: "PaperMod"
defaultContentLanguage: zh
copyright: "© card"
enableGitInfo: true

pagination:
  pagerSize: 5

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

# 自动生成 /sitemap.xml、/index.xml（RSS）、/robots.txt
sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.5

params:
  env: production
  author: "card"
  defaultTheme: auto
  disableThemeToggle: false
  # 首页信息
  homeInfoParams:
    Title: "回顾笔记"
    Content: >
      记录开发中的问题排查、系统优化与工具折腾。AI Agent 工作日志归档。
  # 文章页元信息开关
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: false
  UseHugoToc: true
  disableSpecial1stPost: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false
  # SEO
  description: "回顾笔记 — 个人技术博客，记录 Windows 优化、开发问题排查与 Agent 工作日志。"
  keywords: [回顾笔记, 技术博客, Windows 优化, Agent 日志, 开发笔记, Hugo, card]
  # Open Graph / Twitter Card
  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    safari_pinned_tab: "/safari-pinned-tab.svg"

# 主菜单（顶部导航）
menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 5
    - identifier: categories
      name: 分类
      url: /categories/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 30
    - identifier: search
      name: 搜索
      url: /search/
      weight: 40
    - identifier: records
      name: 日志
      url: /records/
      weight: 45
    - identifier: rules
      name: 规则
      url: /rules/
      weight: 50
    - identifier: changelog
      name: 更新
      url: /changelog/
      weight: 55

# 输出格式：home 同时输出 HTML + JSON（搜索功能需要 JSON）
outputs:
  home:
    - HTML
    - JSON
  section:
    - HTML
  taxonomy:
    - HTML
  term:
    - HTML

# 分类与标签
taxonomies:
  category: categories
  tag: tags

# 代码高亮
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    lineNos: false
    codeFences: true
    guessSyntax: true
    tabWidth: 2
  goldmark:
    renderer:
      unsafe: true
    parser:
      autoHeadingID: true
      autoHeadingIDType: github

# 永久链接格式：/posts/文件名/
permalinks:
  posts: /posts/:contentbasename/
